name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm # keyed off pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # shared must be compiled before api/web can typecheck against its types
      - run: pnpm --filter @octane11/shared build

      - run: pnpm -r lint
      - run: pnpm -r typecheck
      - run: pnpm --filter @octane11/api test
      - run: pnpm --filter @octane11/web build

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: false
          tags: octane11-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
